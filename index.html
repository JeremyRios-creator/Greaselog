      

        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greaselog Raw Debug Terminal</title>
</head>
<body style="background-color: #111827; color: #ffffff; font-family: monospace; padding: 20px;">

    <h1>⚡ Greaselog Debug Terminal</h1>
    <p>Frameworks stripped. Direct native browser execution loop.</p>

    <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 8px;">Vehicle Entry String:</label>
        <input id="smartInput" type="text" placeholder="e.g., 1969 Cougar 351c Restoration" style="width: 300px; padding: 10px;">
        <button id="submitBtn" style="padding: 10px 20px; cursor: pointer;">Log Asset</button>
    </div>

    <div style="background-color: #000000; padding: 15px; border: 1px solid #374151; min-height: 50px;">
        <div id="statusText" style="color: #9ca3af;">System Terminal Idle. Ready for input...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
          // CONFIGURATION: Insert your live Supabase API endpoints here
        const supabaseUrl = https://qjiwirnetqvynraphzfg.supabase.co/rest/v1/;
        const supabaseKey = sb_publishable_uPajrAE_ijWlRtwzzmBmgw_SuqKDgOy;
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const submitBtn = document.getElementById('submitBtn');
        const smartInput = document.getElementById('smartInput');
        const statusText = document.getElementById('statusText');

        submitBtn.addEventListener('click', async () => {
            const rawText = smartInput.value.trim();
            if(!rawText) {
                alert("Input empty!");
                return;
            }

            statusText.style.color = "#fbbf24";
            statusText.innerText = "Data packet outbound to Supabase server...";

            try {
                // 1. Check or generate an operational Household container
                let { data: household, error: fetchErr } = await supabase.from('households').select('*');
                if (fetchErr) throw new Error("Household read failed: " + fetchErr.message);
                
                let householdId;

                if (household && household.length > 0) {
                    householdId = household[0].id;
                } else {
                    statusText.innerText = "No baseline household detected. Injecting first container row...";
                    const { data: newH, error: hErr } = await supabase
                        .from('households')
                        .insert([{ name: "My Project Garage" }])
                        .select();
                        
                    if (hErr) throw hErr;
                    householdId = newH[0].id;
                }

                // 2. Client side string analytics processing (Fuzzy matching)
                const yearMatch = rawText.match(/\b(19\d{2}|20\d{2})\b/);
                const engineMatch = rawText.match(/\b(\d\.\d[L|l]|\d{3}[c|c_i_d])\b/i);

                const payload = {
                    household_id: householdId,
                    nickname: rawText,
                    smart_search_string: rawText.toLowerCase(),
                    custom_spec_fields: {
                        detected_year: yearMatch ? yearMatch[0] : "Not Specified",
                        detected_engine: engineMatch ? engineMatch[0] : "Not Specified",
                        status: "Raw Debug Sync"
                    }
                };

                statusText.innerText = "Household verified. Injecting asset row into vehicles table...";

                // 3. Fire parsed payload into live Postgres asset table
                const { data: vehicle, error: vErr } = await supabase
                    .from('vehicles')
                    .insert([payload])
                    .select();
                    
                if (vErr) throw vErr;

                // Success confirmation presentation
                statusText.style.color = "#34d399";
                statusText.innerHTML = `🎉 <b>SUCCESS!</b> Connection verified.<br><br>` +
                                       `<b>Row UUID:</b> ${vehicle[0].id}<br>` +
                                       `<b>Stored Metadata:</b> ${JSON.stringify(vehicle[0].custom_spec_fields)}`;
                
                smartInput.value = "";

            } catch (error) {
                statusText.style.color = "#f87171";
                statusText.innerText = `❌ Terminal Error: ${error.message}`;
                alert("Database Connection Error:\n" + error.message);
            }
        });
    </script>
</body>
</html>
